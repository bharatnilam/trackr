services:
  # Database Service (PostgreSQL)
  - type: pserv
    name: postgres
    # Render's native PostgreSQL service
    # The free instance is perfect for development and small projects
    databaseName: trackr_api
    databaseUser: trackr_api_user
    plan: free # Can be upgraded later

  # Web Service (Your Laravel API)
  - type: web
    name: trackr-api
    # Use the Docker runtime
    runtime: docker
    # Path to your Dockerfile (optional if it's in the root)
    dockerfilePath: ./Dockerfile
    # Heroku's buildpacks would also work, but Docker gives more control
    # builder: heroku/buildpacks:20
    # buildCommand: "composer install --optimize-autoloader --no-dev"
    # startCommand: "php artisan serve --host 0.0.0.0 --port $PORT"
    # Define environment variables
    envVars:
      # Tell Render where the database is
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString

      # Laravel Environment Variables
      - key: APP_URL
        # This will be your app's public URL
        fromService:
          type: web
          name: trackr-api
          property: url
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql # Using PostgreSQL
      - key: DB_HOST
        fromDatabase:
          name: postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: postgres
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: postgres
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: postgres
          property: password
      # IMPORTANT: You must set this manually in the Render Dashboard
      - key: APP_KEY
        sync: false